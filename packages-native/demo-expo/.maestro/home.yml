appId: ${APP_ID}
tags:
  - smoke
  - home
---
# Test: Home screen loads and displays welcome message
- launchApp:
    clearState: true

# Verify we're on the home screen
- assertVisible: "Welcome!"

# Check for step instructions
- assertVisible: "Step 1: Try it"
- assertVisible: "Step 2: Explore"
- assertVisible: "Step 3: Get a fresh start"

# Verify the wave animation component is present
- assertVisible:
    text: "👋"
    optional: true  # Animation might be at different state

# Take a screenshot for visual verification
- takeScreenshot: home_screen