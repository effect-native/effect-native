# Subflow: Test all collapsible sections on Explore screen
---
# Test File-based routing collapsible
- tapOn: "File-based routing"
- assertVisible: "app/(tabs)/index.tsx"
- assertVisible: "The layout file"
- tapOn: "File-based routing"  # Close it

# Test Android, iOS, and web support collapsible
- tapOn: "Android, iOS, and web support"
- assertVisible: "You can open this project on Android"
- tapOn: "Android, iOS, and web support"  # Close it

# Test Images collapsible
- tapOn: "Images"
- assertVisible: "@2x"
- assertVisible: "@3x"
- tapOn: "Images"  # Close it

# Test Light and dark mode collapsible
- tapOn: "Light and dark mode components"
- assertVisible: "useColorScheme()"
- tapOn: "Light and dark mode components"  # Close it

# Test Animations collapsible
- scrollUntilVisible:
    element: "Animations"
    direction: DOWN
- tapOn: "Animations"
- assertVisible: "react-native-reanimated"
- assertVisible: "components/HelloWave.tsx"
- tapOn: "Animations"  # Close it