# Cross-platform test that works on native and web
# Run with: maestro test .maestro/cross_platform.yml
# For web: maestro -p web test .maestro/cross_platform.yml
appId: ${APP_ID:-${WEB_URL}}  # Use APP_ID for native, WEB_URL for web
tags:
  - cross-platform
  - smoke
---
# Test: Cross-platform smoke test
- launchApp:
    clearState: true

# Universal assertions that work everywhere
- assertVisible: "Welcome!"

# Navigation that works on all platforms
- tapOn:
    text: "Explore"
    optional: true  # Handle different rendering

- assertVisible:
    text: "Explore"
    timeout: 5000  # Give web more time

- assertVisible: "This app includes example code"

# Go back
- tapOn:
    text: "Home"
    optional: true

- assertVisible: "Welcome!"

- takeScreenshot: cross_platform_${PLATFORM:-native}