url: ${WEB_URL}
tags:
  - web
  - navigation
---
# Test: Web navigation between Home and Explore screens
- launchApp

# Wait for initial load
- waitForAnimationToEnd

# Start on home screen
- assertVisible: "Welcome!"

# Navigate to Explore - might need different selector for web
- tapOn:
    text: "Explore"
    index: 0  # In case there are multiple matches

# Verify we're on the Explore screen
- assertVisible: "Explore"
- assertVisible: "This app includes example code to help you get started."

# Test collapsibles on web
- tapOn: "File-based routing"
- assertVisible: "app/(tabs)/index.tsx"

# Collapse it
- tapOn: "File-based routing"

# Navigate back to Home
- tapOn:
    text: "Home"
    index: 0

- assertVisible: "Welcome!"

- takeScreenshot: web_navigation_complete