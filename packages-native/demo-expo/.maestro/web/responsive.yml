url: ${WEB_URL}
tags:
  - web
  - responsive
---
# Test: Web-specific responsive behavior
- launchApp

# Test initial viewport
- assertVisible: "Welcome!"

# Test scrolling behavior on web
- scroll:
    direction: DOWN
    duration: 2000

- scroll:
    direction: UP
    duration: 2000

# Navigate to Explore
- tapOn: "Explore"

# Test collapsibles work on web
- runFlow: 
    file: ../subflows/test_collapsibles.yml
    env:
      PLATFORM: web

# Test keyboard navigation (web-specific)
- pressKey: tab
- pressKey: tab
- pressKey: enter

- takeScreenshot: web_responsive_test