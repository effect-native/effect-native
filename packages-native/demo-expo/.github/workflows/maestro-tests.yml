name: Maestro E2E Tests

on:
  pull_request:
    paths:
      - 'packages-native/demo-expo/**'
  push:
    branches:
      - main
      - 'effect-native/**'

jobs:
  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          
      - name: Start Expo Web
        run: |
          cd packages-native/demo-expo
          npx expo start --web --non-interactive &
          sleep 15  # Wait for server
        
      - name: Run Web Tests
        run: |
          cd packages-native/demo-expo
          maestro -p web test .maestro/web
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: maestro-screenshots-web
          path: ~/.maestro/tests/
          
  test-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          
      - name: Install dependencies
        run: pnpm install
        
      - name: Install Maestro
        run: |
          curl -fsSL https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
          
      - name: Setup iOS Simulator
        run: |
          xcrun simctl create test-iphone "iPhone 15" iOS17.0
          xcrun simctl boot test-iphone
          
      - name: Build iOS app
        run: |
          cd packages-native/demo-expo
          npx expo prebuild --platform ios
          npx expo run:ios --no-dev --configuration Release
          
      - name: Run iOS Tests  
        run: |
          cd packages-native/demo-expo
          maestro test .maestro
          
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: maestro-screenshots-ios
          path: ~/.maestro/tests/