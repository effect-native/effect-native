name: Setup
description: Perform standard setup and install dependencies using bun.
inputs:
  node-version:
    description: The version of Node.js to install
    required: true
    default: 23.7.0
  bun-version:
    description: The version of Bun to install
    required: true
    default: latest
  zig-version:
    description: The version of Zig to install
    required: true
    default: 0.15.2

runs:
  using: composite
  steps:
    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}
    - name: Install node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - name: Install zig
      uses: mlugg/setup-zig@v2
      with:
        version: ${{ inputs.zig-version }}
    - name: Install dependencies
      shell: bash
      env:
        BUN_INSTALL_CACHE_DIR: "${{ runner.temp }}/bun-install-cache"
        NODE_OPTIONS: "--max-old-space-size=4096"
        PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      run: mkdir -p "$BUN_INSTALL_CACHE_DIR" && bun install --frozen-lockfile
