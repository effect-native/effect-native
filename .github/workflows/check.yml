name: Check
on:
  workflow_dispatch:
  pull_request:
    branches: [effect-native/main]
  push:
    branches: [effect-native/main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  types:
    name: Types
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm check
      - run: pnpm test-types --target '>=5.4'

  lint:
    name: Lint
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Install dependencies
        uses: ./.github/actions/setup
      - run: pnpm circular
      - run: pnpm lint
      - run: pnpm codegen
      - name: Check for codegen changes
        run: git diff --exit-code

  test:
    name: Test (${{ matrix.runtime }} ${{ matrix.shard }})
    runs-on: self-hosted
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
        # runtime: [Node, Bun] # TODO: Re-enable bun test suite after https://github.com/oven-sh/bun/issues/4145 is resolved
        runtime: [Node]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Install dependencies
        uses: ./.github/actions/setup
      - uses: oven-sh/setup-bun@v2
        if: matrix.runtime == 'Bun'
      - name: Test
        run: |
          if [ "${{ matrix.runtime }}" == "Bun" ]; then
            pnpm vitest --shard ${{ matrix.shard }}
          else
            pnpm test --shard ${{ matrix.shard }}
          fi

  verify-subpaths:
    name: Verify Subpaths
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - name: Install dependencies
        uses: ./.github/actions/setup
      - name: Verify effect subpath builds
        run: pnpm verify-subpaths
