name: Release
on:
  push:
    branches: [effect-native/main, v4]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    if: github.repository_owner == 'effect-native'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/setup

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "23.7.0"
          registry-url: "https://registry.npmjs.org"
          scope: "@effect-native"

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Verify npm version supports trusted publishing
        run: |
          NPM_VERSION="$(npm --version)"
          echo "npm ${NPM_VERSION}"
          node -e "const raw=process.argv[1]; const v=raw.split('.').map(Number); const ok=v[0] > 11 || (v[0] === 11 && v[1] >= 5); if (!ok) { console.error('npm version too old for reliable OIDC trusted publishing: ' + raw); process.exit(1); }" "$NPM_VERSION"

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@e0145edc7d9d8679003495b11f87bd8ef63c0cba
        with:
          version: bun run changeset-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: OIDC preflight - scrub npm auth
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          echo "=== OIDC Preflight ==="
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && [ -n "$ACTIONS_ID_TOKEN_REQUEST_TOKEN" ]; then
            echo "OIDC request environment present"
          else
            echo "OIDC request environment missing"
            exit 1
          fi
          for npmrc in "$NPM_CONFIG_USERCONFIG" "$HOME/.npmrc" ".npmrc"; do
            if [ -n "$npmrc" ] && [ -f "$npmrc" ]; then
              echo "Cleaning $npmrc"
              sed -i -E '/\/\/registry\.npmjs\.org\/:(_authToken|_auth)\s*=/d' "$npmrc"
              sed -i -E '/^\s*(_authToken|_auth)\s*=/d' "$npmrc"
              sed -i -E '/^\s*[Aa]lways-[Aa]uth\s*=/d' "$npmrc"
            fi
          done
          npm ping
          if npm whoami >/dev/null 2>&1; then
            echo "Warning: npm whoami succeeded without OIDC token"
          else
            echo "Confirmed: npm whoami failed (expected for OIDC)"
          fi
          npm config get registry

      - name: OIDC exchange probe
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from urllib.error import HTTPError

          id_token_url = os.environ["ACTIONS_ID_TOKEN_REQUEST_URL"] + "&audience=npm:registry.npmjs.org"
          id_token_req = urllib.request.Request(
              id_token_url,
              headers={"Authorization": f"Bearer {os.environ['ACTIONS_ID_TOKEN_REQUEST_TOKEN']}"},
          )
          with urllib.request.urlopen(id_token_req) as response:
              oidc_token = json.load(response)["value"]

          packages = [
              "effect-native",
              "@effect-native/debug",
              "@effect-native/patterns",
              "@effect-native/schemas",
          ]

          for package in packages:
              exchange_url = "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/" + urllib.parse.quote(package, safe="")
              exchange_req = urllib.request.Request(
                  exchange_url,
                  data=b"",
                  method="POST",
                  headers={"Authorization": f"Bearer {oidc_token}"},
              )
              try:
                  with urllib.request.urlopen(exchange_req) as exchange_response:
                      body = exchange_response.read().decode("utf-8")
                      parsed = json.loads(body) if body else {}
                      has_token = bool(parsed.get("token"))
                      print(f"{package}: {exchange_response.status} token={has_token}")
              except HTTPError as error:
                  payload = error.read().decode("utf-8", errors="replace").replace("\n", " ")
                  print(f"{package}: {error.code} {payload[:200]}")
          PY

      - name: Publish packages with OIDC
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          unset NODE_AUTH_TOKEN
          unset NPM_CONFIG_USERCONFIG
          export NPM_CONFIG_PROVENANCE=true
          export NPM_CONFIG_LOGLEVEL=verbose
          if [ "$GITHUB_REF_NAME" = "v4" ]; then
            bun run changeset-publish-beta
          else
            bun run changeset-publish
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
